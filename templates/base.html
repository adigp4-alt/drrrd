<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Iran Investment Tracker{% endblock %}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    {% block head %}{% endblock %}
    <style>
        :root {
            --bg-color: #0B0F19;
            --surface-color: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-glow: rgba(59, 130, 246, 0.5);
            --success-color: #10B981;
            --danger-color: #F43F5E;
        }
        
        body { 
            background-color: var(--bg-color); 
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.08), transparent 25%);
            background-attachment: fixed;
            font-family: 'Outfit', sans-serif;
            color: #F8FAFC;
        }

        /* Glassmorphism Navbar */
        .navbar { 
            background: rgba(11, 15, 25, 0.8) !important;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
            margin-bottom: 2.5rem !important;
        }
        .navbar-brand { 
            font-weight: 700; 
            letter-spacing: 0.5px; 
            background: linear-gradient(135deg, #60A5FA, #A78BFA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.5rem;
        }
        .nav-link { 
            color: #94A3B8 !important; 
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            margin: 0 0.2rem;
            padding: 0.5rem 1rem !important;
            border-radius: 8px;
        }
        .nav-link:hover { 
            color: #F8FAFC !important; 
            background: rgba(255,255,255,0.05);
        }
        .nav-link.active {
            color: #fff !important;
            background: rgba(59, 130, 246, 0.1);
        }
        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: 0px;
            left: 15%;
            width: 70%;
            height: 2px;
            background: linear-gradient(90deg, #3B82F6, #8B5CF6);
            border-radius: 2px;
            box-shadow: 0 0 8px var(--primary-glow);
        }

        /* Premium Cards */
        .card { 
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color); 
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2); 
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            overflow: hidden;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            border-color: rgba(255, 255, 255, 0.15);
        }
        .card-header {
            background: rgba(255,255,255,0.02) !important;
            border-bottom: 1px solid var(--border-color) !important;
            font-weight: 600;
        }

        /* Stats & Typography */
        .stat-card { padding: 1.5rem; text-align: center; }
        .stat-card .value { 
            font-size: 2.2rem; 
            font-weight: 700; 
            letter-spacing: -0.5px;
            margin-bottom: 0.2rem;
        }
        .stat-card .label { 
            color: #94A3B8; 
            font-size: 0.85rem; 
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        
        /* Modern Utilities */
        .text-profit, .text-success { color: var(--success-color) !important; text-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }
        .text-loss, .text-danger { color: var(--danger-color) !important; text-shadow: 0 0 10px rgba(244, 63, 94, 0.2); }
        h1, h2, h3, h4, h5 { font-weight: 600; letter-spacing: -0.5px; }
        
        .badge {
            padding: 0.5em 0.8em;
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .badge-bullish, .bg-success { background: rgba(16, 185, 129, 0.15) !important; color: var(--success-color) !important; border: 1px solid rgba(16, 185, 129, 0.3); }
        .badge-bearish, .bg-danger { background: rgba(244, 63, 94, 0.15) !important; color: var(--danger-color) !important; border: 1px solid rgba(244, 63, 94, 0.3); }
        .badge-neutral, .bg-secondary { background: rgba(148, 163, 184, 0.1) !important; color: #94A3B8 !important; border: 1px solid rgba(148, 163, 184, 0.2); }

        /* Tables */
        .table {
            color: #F8FAFC;
            border-color: var(--border-color);
            table-layout: auto;
        }
        .table-dark {
            --bs-table-bg: transparent;
            --bs-table-color: #F8FAFC;
        }
        .table>thead {
            background: rgba(0,0,0,0.2);
        }
        .table>thead>tr>th {
            border-bottom-color: rgba(255,255,255,0.1);
            color: #94A3B8;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            padding: 1rem;
        }
        .table>tbody>tr>td {
            padding: 1.2rem 1rem;
            vertical-align: middle;
            border-bottom-color: var(--border-color);
            transition: background 0.2s ease;
        }
        .table-hover>tbody>tr:hover>* {
            background: rgba(255, 255, 255, 0.03);
            color: #F8FAFC;
            box-shadow: none;
        }

        /* Buttons */
        .btn { font-weight: 500; letter-spacing: 0.5px; border-radius: 8px; transition: all 0.3s ease; }
        .btn-primary {
            background: linear-gradient(135deg, #3B82F6, #6366F1);
            border: none;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
            padding: 0.6rem 1.5rem;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
        }
        
        .btn-outline-secondary {
            border-color: var(--border-color);
            color: #E2E8F0;
        }
        .btn-outline-secondary:hover {
            background: rgba(255,255,255,0.08);
            border-color: #CBD5E1;
            color: #fff;
        }

        /* Animations */
        .near-target { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; text-shadow: 0 0 15px rgba(59, 130, 246, 0.8); } 50% { opacity: 0.7; text-shadow: 0 0 5px rgba(59, 130, 246, 0.2); } }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

        {% block style %}{% endblock %}
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Iran Investment Tracker</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/screener">Screener</a></li>
                    <li class="nav-item"><a class="nav-link" href="/portfolio">Portfolio</a></li>
                    <li class="nav-item"><a class="nav-link" href="/backtest">Backtest</a></li>
                    <li class="nav-item"><a class="nav-link" href="/stat-arb">Stat-Arb</a></li>
                    <li class="nav-item"><a class="nav-link" href="/analysis">Analysis</a></li>
                    <li class="nav-item"><a class="nav-link" href="/alerts">Alerts</a></li>
                    <li class="nav-item"><a class="nav-link" href="/watchlist">Watchlist</a></li>
                    <li class="nav-item"><a class="nav-link" href="/correlation">Correlation</a></li>
                    <li class="nav-item"><a class="nav-link" href="/reports">Reports</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Highlight active nav link
        document.querySelectorAll('.nav-link').forEach(link => {
            if (link.getAttribute('href') === window.location.pathname) {
                link.classList.add('active');
            }
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
